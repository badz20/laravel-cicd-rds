name: Deploy Laravel to EC2 with RDS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /var/www/laravel-cicd-rds
            sudo git pull origin main
            sudo composer install --no-dev --optimize-autoloader

            # Update .env with RDS credentials
            sudo sed -i 's/DB_HOST=.*/DB_HOST=${{ secrets.RDS_HOST }}/' .env
            sudo sed -i 's/DB_DATABASE=.*/DB_DATABASE=${{ secrets.RDS_DATABASE }}/' .env
            sudo sed -i 's/DB_USERNAME=.*/DB_USERNAME=${{ secrets.RDS_USERNAME }}/' .env
            sudo sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=${{ secrets.RDS_PASSWORD }}/' .env

            # Fix permissions
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            # Clear and rebuild caches
            sudo php artisan optimize:clear
            sudo php artisan config:cache

            sudo systemctl restart php8.4-fpm
            echo "✅ Deployment completed at $(date)"
          EOF
